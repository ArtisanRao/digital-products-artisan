<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    form { max-width: 400px; margin-top: 20px; }
    input, textarea { width: 100%; margin-bottom: 10px; padding: 10px; }
    button { padding: 10px 20px; background: black; color: white; border: none; }
  </style>
</head>
<body>
  <h1>Contact Us</h1>
  <p>If you have any questions, email us at <a href="mailto:digitalproductsartisan@gmail.com">digitalproductsartisan@gmail.com</a> or fill the form below:</p>

  <form action="https://formsubmit.co/digitalproductsartisan@gmail.com" method="POST">
    <input type="text" name="name" placeholder="Your Name" required />
    <input type="email" name="email" placeholder="Your Email" required />
    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>
</body>
</html>
